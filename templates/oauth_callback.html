<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook OAuth 回调</title>
    <style>
        body {
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            margin: 0;
            padding: 24px;
            background: #f5f7fb;
            color: #1f2937;
        }
        .card {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            padding: 24px;
        }
        h1 {
            font-size: 20px;
            margin-top: 0;
        }
        .hint {
            color: #475569;
            line-height: 1.6;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            margin-top: 12px;
            font-family: Consolas, monospace;
            font-size: 12px;
        }
        .error {
            color: #b91c1c;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>微软授权结果已返回</h1>
        <p class="hint" id="callbackStatus">正在尝试自动回传到主窗口……</p>
        <p class="hint">如果当前窗口没有自动关闭，请复制下方完整回跳地址，回到系统弹窗中继续完成换取。</p>
        <textarea id="callbackUrl" readonly></textarea>
    </div>

    <script>
        (function () {
            const callbackUrl = window.location.href;
            const params = new URL(callbackUrl).searchParams;
            const statusEl = document.getElementById('callbackStatus');
            const textarea = document.getElementById('callbackUrl');
            let callbackAcked = false;
            textarea.value = callbackUrl;

            const payload = {
                type: 'outlook-oauth-callback',
                redirected_url: callbackUrl,
                error: params.get('error') || '',
                error_description: params.get('error_description') || ''
            };

            window.addEventListener('message', function (event) {
                if (!event || !event.data || event.data.type !== 'outlook-oauth-callback-ack') {
                    return;
                }

                callbackAcked = true;
                statusEl.textContent = payload.error
                    ? `已确认回传微软授权失败信息：${payload.error_description || payload.error}`
                    : '主窗口已确认收到授权结果，当前窗口即将关闭。';
                if (payload.error) {
                    statusEl.classList.add('error');
                }
                window.setTimeout(function () {
                    window.close();
                }, 400);
            });

            if (window.opener && !window.opener.closed) {
                try {
                    window.opener.postMessage(payload, window.location.origin);
                    statusEl.textContent = payload.error
                        ? `正在等待主窗口确认微软授权失败信息：${payload.error_description || payload.error}`
                        : '正在等待主窗口确认授权结果；如果没有自动关闭，请手工复制下方回跳地址。';
                    if (payload.error) {
                        statusEl.classList.add('error');
                    }
                    window.setTimeout(function () {
                        if (!callbackAcked) {
                            statusEl.textContent = '自动回传未确认，请手工复制下方回跳地址并回到系统弹窗继续。';
                            statusEl.classList.add('error');
                        }
                    }, 1200);
                    return;
                } catch (error) {
                    statusEl.textContent = '自动回传失败，请手工复制下方回跳地址。';
                    statusEl.classList.add('error');
                }
            } else {
                statusEl.textContent = '未检测到主窗口，请手工复制下方回跳地址。';
            }
        })();
    </script>
</body>
</html>
